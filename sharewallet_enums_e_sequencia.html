function cb(text,lbl=''){
  const h = text.replace(/\n/g,'<br>').replace(/  /g,'&nbsp;&nbsp;');
  return `<div class="cb">${lbl?`<div style="font-size:10px;color:#585B70;font-family:var(--font-mono);margin-bottom:6px;">${lbl}</div>`:''}<pre>${text}</pre></div>`;
}
